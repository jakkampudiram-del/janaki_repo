version: 2models:- name: stg_salesdescription: "Staging model for raw sales data, incrementally loaded and merged from the BigQuery raw sales table. This model captures sales transactions, ensuring updates are handled via a merge strategy based on the primary key and update timestamp."columns:- name: iddescription: "The unique identifier for each sales transaction. This serves as the primary key for incremental merges."- name: product_iddescription: "The identifier for the product sold in the transaction."- name: quantitydescription: "The quantity of the product sold."- name: pricedescription: "The unit price of the product at the time of sale."- name: sale_datedescription: "The date when the sale occurred."- name: customer_iddescription: "The identifier for the customer who made the purchase."- name: updated_atdescription: "Timestamp indicating the last time the record was updated in the source system. Used for incremental filtering."- name: dbt_loaded_atdescription: "Timestamp indicating when the record was loaded or last updated by dbt."