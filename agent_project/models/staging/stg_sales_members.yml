version: 2models:- name: stg_sales_members description: "Staging model for core sales and member data, prepared for CDC snapshotting. Includes operational update timestamps and record hashes to track changes." columns:- name: id description: "Unique identifier for the sales record."- name: sale_id description: "Identifier for the sale transaction."- name: member_id description: "Identifier for the member associated with the sale."- name: sale_date description: "Date of the sale transaction."- name: amount description: "Amount of the sale."- name: status description: "Current status of the sale (e.g., completed, pending, cancelled).
"- name: dbt_updated_at description: "Operational timestamp indicating the last update time of the record in the source system. Used by dbt snapshots to detect changes based on timestamp."- name: dbt_record_hash description: "MD5 hash of key columns (id, sale_id, member_id, sale_date, amount, status) to detect changes in record content. Used by dbt snapshots for check_cols strategy."